<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Alternatif - SAW Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand-box">
                <div class="brand-logo"><i class="fa-solid fa-caret-up"></i></div>
                <div class="brand-name">
                    <h3>Sistem Rekomendasi</h3>
                    <p>produk skincare halal</p>
                </div>
            </div>
            <nav class="nav-menu">
                <span class="label">DATA</span>
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> Dasboard</a>
                <a href="kriteria.html" class="nav-link"><i class="fa-solid fa-list-ul"></i> Data Kriteria</a>
                <a href="alternatif.html" class="nav-link active"><i class="fa-solid fa-address-book"></i> Data Alternatif</a>
                <a href="penilaian.html" class="nav-link"><i class="fa-solid fa-square-poll-vertical"></i> Penilaian</a>
                <a href="matriks.html" class="nav-link"><i class="fa-solid fa-table"></i> Matriks Perhitungan</a>
                <a href="hasil-rekomendasi.html" class="nav-link"><i class="fa-solid fa-wand-magic-sparkles"></i> Hasil Rekomendasi</a>
                <a href="user.html" class="nav-link"><i class="fa-solid fa-users-gear"></i> Data User</a>
                <a href="riwayat.html" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pengguna</a>
                <div class="nav-logout">
                    <a href="#" class="nav-link btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content-area">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="back-circle" onclick="window.location.href='alternatif.html'"><i class="fa-solid fa-chevron-left"></i></button>
                    <h2>Dashboard</h2>
                </div>
            </header>

            <section class="body-content">
                <div class="header-flex">
                    <div class="header-title">
                        <p class="path">Dashboard > Data Alternatif > <span>Tambah</span></p>
                        <h1>Data Alternatif</h1>
                    </div>
                </div>

                <!-- Form Card -->
                <div class="card-container form-card">
                    <div class="card-header">
                        <div class="left"><strong>Tambah Data Alternatif</strong></div>
                        <div class="right"><i class="fa-solid fa-plus" style="color: #448aff;"></i></div>
                    </div>

                    <form id="form-tambah-alternatif">
                        <!-- 1. Pilih Kategori -->
                        <div class="input-group">
                            <label>Kategori Produk</label>
                            <select id="input_kategori" required>
                                <option value="" disabled selected>Pilih Kategori</option>
                                <option value="facewash">Face Wash</option>
                                <option value="moisturizer">Moisturizer</option>
                                <option value="sunscreen">Sunscreen</option>
                            </select>
                        </div>

                        <!-- 2. Kode Alternatif (Manual agar fleksibel A1/M1) -->
                        <div class="input-group">
                            <label>Kode Alternatif</label>
                            <input type="text" id="input_kode" placeholder="Contoh: A1 (Face Wash) atau M1 (Moist)" required>
                        </div>

                        <!-- 3. Nama Produk -->
                        <div class="input-group">
                            <label>Nama Produk</label>
                            <input type="text" id="input_nama" placeholder="Masukkan nama produk skincare..." required>
                        </div>

                        <!-- 4. Jenis Kulit -->
                        <div class="input-group">
                            <label>Jenis Kulit</label>
                            <select id="input_kulit" required>
                                <option value="" disabled selected>Pilih Jenis Kulit</option>
                                <option value="Normal">Normal</option>
                                <option value="Berminyak">Berminyak</option>
                                <option value="Kering">Kering</option>
                                <option value="Sensitif">Sensitif</option>
                                <option value="Kombinasi">Kombinasi</option>
                            </select>
                        </div>

                        <!-- 5. Permasalahan Kulit -->
                        <div class="input-group">
                            <label>Permasalahan Kulit</label>
                            <select id="input_masalah" required>
                                <option value="" disabled selected>Pilih Permasalahan</option>
                                <option value="Jerawat">Jerawat</option>
                                <option value="Kusam">Kusam</option>
                                <option value="Kemerahan atau iritasi">Kemerahan atau iritasi</option>
                                <option value="Flek atau Hiperpigmentasi">Flek atau Hiperpigmentasi</option>
                                <option value="Pori- Pori Besar dan Komedo">Pori-Pori Besar dan Komedo</option>
                                <option value="Skin Barrier Rusak">Skin Barrier Rusak</option>
                            </select>
                        </div>

                        <!-- Tombol Aksi di Kanan Bawah sesuai gambar -->
                        <div class="form-buttons">
                            <button type="submit" class="btn-save-data">
                                <i class="fa-solid fa-floppy-disk"></i> Save
                            </button>
                            <button type="reset" class="btn-restart-data">
                                <i class="fa-solid fa-rotate-right"></i> Restart
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/alternatif.js"></script>
    <script src="script.js"></script>
</body>
</html>
