<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Kriteria - SAW Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand-box">
                <div class="brand-logo"><i class="fa-solid fa-caret-up"></i></div>
                <div class="brand-name">
                    <h3>Sistem Rekomendasi</h3>
                    <p>produk skincare halal</p>
                </div>
            </div>
            <nav class="nav-menu">
                <span class="label">DATA</span>
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> Dasboard</a>
                <a href="kriteria.html" class="nav-link active"><i class="fa-solid fa-list-ul"></i> Data Kriteria</a>
                <a href="alternatif.html" class="nav-link"><i class="fa-solid fa-address-book"></i> Data Alternatif</a>
                <!-- <a href="matriks.html" class="nav-link"><i class="fa-solid fa-table"></i> Matriks Perhitungan</a>
                <a href="hasil-rekomendasi.html" class="nav-link">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Hasil Rekomendasi
                </a> -->
                <a href="user.html" class="nav-link">
                    <i class="fa-solid fa-users-gear"></i> Data User
                </a>
                <a href="riwayat.html" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> Riwayat
                    Pengguna</a>
                <div class="nav-logout"><a href="#" class="nav-link btn-logout"><i
                            class="fa-solid fa-right-from-bracket"></i> Logout</a></div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content-area">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="back-circle" onclick="window.location.href='kriteria.html'"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <h2>Dashboard</h2>
                </div>
            </header>

            <section class="body-content">
                <div class="header-flex">
                    <div class="header-title">
                        <p class="path">Dashboard > Data Kriteria > <span>Edit</span></p>
                        <h1>Data Kriteria</h1>
                    </div>
                </div>

                <!-- Form Card -->
                <div class="card-container form-card">
                    <div class="card-header">
                        <div class="left"><strong>Edit Data Kriteria</strong></div>
                        <div class="right"><i class="fa-solid fa-pencil"></i></div>
                    </div>

                    <form id="form-edit-kriteria">
                        <div class="input-group">
                            <label>Kode Kriteria</label>
                            <input type="text" id="edit_krit_kode" readonly
                                style="background-color: #f5f5f5; cursor: not-allowed;">
                        </div>

                        <div class="input-group">
                            <label>Nama Kriteria</label>
                            <input type="text" id="edit_krit_nama" placeholder="Contoh: Komposisi Bahan" required>
                        </div>

                        <div class="grid-2">
                            <div class="input-group">
                                <label>Type</label>
                                <select id="edit_krit_type" required>
                                    <option value="Benefit">Benefit</option>
                                    <option value="Cost">Cost</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Bobot kriteria</label>
                                <select id="edit_krit_bobot" required>
                                    <option value="0.20">0.20</option>
                                    <option value="0.20">0.20</option>
                                    <option value="0.15">0.15</option>
                                    <option value="0.15">0.15</option>
                                    <option value="0.15">0.15</option>
                                    <option value="0.10">0.10</option>
                                    <option value="0.10">0.10</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-buttons">
                            <button type="submit" class="btn-save-data"><i class="fa-solid fa-floppy-disk"></i>
                                Save</button>
                            <button type="button" class="btn-restart-data" onclick="location.reload()"><i
                                    class="fa-solid fa-rotate-right"></i> Restart</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/kriteria.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
